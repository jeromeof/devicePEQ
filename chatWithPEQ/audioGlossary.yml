lp_record: Long-playing vinyl record typically rotating at 33⅓ rpm.
single_record: Vinyl disc typically rotating at 45 rpm.
rpm: Revolutions per minute describing platter speed.
phono_cartridge: Transducer converting groove motion into electrical signal.
moving_magnet: Cartridge type with magnet attached to cantilever.
moving_coil: Cartridge type with coil attached to cantilever.
high_output_mc: Moving coil cartridge with elevated output voltage.
low_output_mc: Moving coil cartridge requiring high-gain phono stage.
stylus: Needle tracing vinyl groove.
elliptical_stylus: Stylus shape with improved groove tracing.
microline_stylus: Advanced stylus shape for precise groove contact.
cantilever: Arm connecting stylus to generator.
tracking_force: Downward force applied to stylus.
anti_skate: Compensation for inward tracking force during playback.
compliance: Flexibility of cartridge suspension.
resonance_frequency_tonearm: Mechanical resonance between cartridge and tonearm.
tonearm: Mechanical arm supporting phono cartridge.
effective_mass: Mass parameter influencing tonearm resonance.
phono_stage: Preamplifier equalizing and amplifying cartridge signal.
riaa_equalization: Standardized equalization curve for vinyl playback.
subsonic_filter: High-pass filter removing very low-frequency rumble.
rumble: Low-frequency noise from turntable bearings or motor.
idler_drive: Turntable drive system using idler wheel.
belt_drive: Turntable drive system using elastic belt.
direct_drive: Turntable drive system using motor directly coupled to platter.
platter: Rotating disc supporting vinyl record.
bearing_noise: Mechanical noise from turntable bearing.
vinyl_surface_noise: Crackle and noise from record wear or contamination.
inner_groove_distortion: Distortion occurring near center of vinyl due to reduced linear speed.
lacquer_cutting: Process of engraving master disc for vinyl pressing.
cutting_lathe: Machine used to engrave vinyl master.
preview_head: Tape head providing signal for groove spacing control.
groove_modulation: Physical variation of vinyl groove representing audio.
stereo_groove: 45/45 degree groove encoding left and right channels.
mono_groove: Single lateral modulation groove.
shellac_record: Early brittle disc format predating vinyl.
78rpm_record: Early high-speed shellac disc format.
acetate_disc: Temporary lacquer disc for test pressings.
analog_delay: Echo created using magnetic tape loop.
plate_reverb: Reverb generated by vibrating metal plate.
spring_reverb: Reverb created using suspended springs.
mechanical_filter: Physical acoustic filtering structure.
analog_synthesizer: Instrument generating sound via analog circuits.
voltage_controlled_oscillator: Oscillator controlled by input voltage.
voltage_controlled_filter: Analog filter controlled by voltage.
voltage_controlled_amplifier: Amplifier controlled by voltage envelope.
modular_synth: Synthesizer composed of patchable modules.
patch_cable: Cable connecting modules in analog system.
control_voltage: Analog signal controlling parameter in synthesizer.
broadcast_chain: The complete audio signal path from studio production to transmission and reception.
program_loudness: Average perceived loudness of broadcast content over time.
loudness_range: Statistical measure of program dynamic variation.
true_peak_limiting: Limiting process accounting for inter-sample peaks in digital broadcast.
dialnorm: Dolby metadata parameter controlling dialogue playback level normalization.
downmix: Reduction of multichannel audio to fewer channels.
upmix: Algorithmic expansion of stereo content into multichannel format.
fold_down: Combining multiple channels into stereo or mono.
metadata_flag: Embedded control information within digital stream.
ebu_r128_target: -23 LUFS broadcast loudness standard in Europe.
atsc_a85: North American loudness regulation standard.
calm_act: US regulation requiring consistent broadcast loudness.
cinema_reference_level: Standardized theatrical playback level around 85 dB SPL.
x_curve: Cinema equalization curve compensating for large-room acoustics.
dolby_cinema_processor: Hardware managing multichannel cinema audio playback.
immersive_audio: Three-dimensional object-based sound reproduction format.
object_based_audio: Audio format encoding sound objects with positional metadata.
channel_based_audio: Audio format assigning signals to fixed speaker channels.
bed_channel: Fixed multichannel foundation in object-based systems.
lfe_channel: Low-frequency effects channel in surround formats.
bass_management: Redirecting low frequencies to subwoofer.
timecode: Synchronization signal aligning audio and video.
word_length: Number of bits representing digital audio sample.
jitter_attenuation: Reduction of clock timing variation.
linear_power_supply: Power supply using transformer and linear regulation.
switching_power_supply: High-frequency regulated power supply.
regulator: Circuit maintaining constant output voltage.
low_dropout_regulator: Voltage regulator operating with small input-output difference.
star_grounding: Grounding topology minimizing ground loops.
ground_loop: Unwanted hum caused by multiple ground paths.
shielding: Physical barrier reducing electromagnetic interference.
emi: Electromagnetic interference affecting signal integrity.
rfi: Radio-frequency interference in audio circuits.
twisted_pair: Cable design reducing electromagnetic pickup.
coaxial_cable: Shielded cable with central conductor.
balanced_line: Differential signal transmission reducing noise.
unbalanced_line: Single-ended signal transmission referenced to ground.
common_mode_noise: Noise present equally on both signal conductors.
differential_signal: Signal represented by voltage difference between two conductors.
skin_effect: Increased AC resistance at high frequencies due to current distribution.
capacitance_per_meter: Cable capacitance affecting high-frequency rolloff.
inductance_per_meter: Cable inductance affecting impedance behavior.
characteristic_impedance: Transmission line impedance determined by geometry.
reflection_coefficient: Ratio of reflected to incident wave amplitude.
termination: Load matching transmission line impedance.
bode_plot: Graph of magnitude and phase versus frequency.
network_analyzer: Instrument measuring frequency response and impedance.
oscilloscope: Instrument displaying voltage versus time.
audio_analyzer: Precision instrument measuring distortion and noise.
apx555: High-performance audio analyzer by Audio Precision.
distortion_residual: Remaining signal after fundamental removed.
null_test: Comparison technique subtracting signals to reveal differences.
loopback_test: Routing output to input to evaluate device performance.
dynamic_headroom_test: Measurement of short-term peak capability.
burst_test: Short-duration high-level signal measurement.
multitone_stimulus: Complex signal approximating musical content.
crest_factor_test: Evaluation of peak-to-average capability.
phase_noise_plot: Graph showing oscillator phase instability.
clock_phase_jitter: Short-term deviation in clock timing edges.
bit_error_rate: Ratio of erroneous bits to total transmitted bits.
checksum: Error detection code for digital transmission.
redundancy: Additional data enabling error correction.
latency_budget: Total allowable delay in signal path.
synchronization: Alignment of multiple digital systems to common clock.
genlock: Video synchronization reference used in broadcast.
wordclock_distribution: Distribution of master clock to multiple devices.
sample_accuracy: Exact alignment of digital audio samples.
bit_transparency: Transmission preserving identical bitstream.
zero_latency_monitoring: Direct hardware monitoring bypassing processing delay.
gain_calibration: Adjustment to known reference level.
reference_voltage: Defined voltage used for calibration.
linearity_error: Deviation from ideal linear response.
hysteresis: Dependence of system output on previous state.
transfer_function: Mathematical relationship between input and output.
noise_bandwidth: Effective bandwidth over which noise is measured.
weighted_noise: Noise measurement using perceptual weighting curve.
unweighted_noise: Flat frequency noise measurement.
crest_factor_limit: Maximum achievable peak-to-average ratio.
dc_blocking: Removal of DC offset from signal path.
servo_circuit: Control loop correcting offset or drift.
thermal_drift: Performance variation due to temperature change.
component_tolerance: Allowable deviation from nominal value.
matched_pair: Components selected for tight parameter matching.
precision_resistor: Resistor with low tolerance and temperature coefficient.
dielectric_absorption: Capacitor memory effect causing signal error.
electrolytic_capacitor: Polarized capacitor with high capacitance per volume.
film_capacitor: Capacitor type with stable characteristics.
torroidal_transformer: Donut-shaped transformer with low magnetic leakage.
magnetic_hysteresis: Lagging magnetization effect in core materials.
eddy_current: Induced currents causing energy loss in conductors.
shielded_transformer: Transformer designed to reduce EMI.
neutral: Frequency response approximating a perceptually flat target curve without intentional coloration.
colored: Frequency response deviating from neutral target producing tonal emphasis.
transparent: Low distortion and minimal deviation from input signal characteristics.
analytical: Perceived emphasis on detail often associated with elevated upper midrange or treble energy.
musical: Subjective descriptor often implying smooth frequency response and low harsh distortion.
clinical: Perceived highly revealing sound sometimes associated with minimal harmonic coloration.
warm: Emphasis in low-mid frequencies with slightly attenuated upper treble.
bright: Elevated energy in upper midrange or treble frequencies.
dark: Reduced high-frequency energy relative to midrange.
laid_back: Slight recession in presence region reducing forwardness.
forward: Elevated presence region increasing vocal immediacy.
airy: Extended high-frequency response above 10 kHz with low distortion.
holographic: Strong spatial imaging often associated with consistent off-axis response and low phase distortion.
three_dimensional: Perception of depth and spatial layering.
wide_soundstage: Strong lateral imaging often influenced by channel separation and HRTF cues.
deep_soundstage: Perception of front-to-back layering influenced by reverberation cues.
separation: Ability to distinguish individual elements in mix.
microdynamics: Reproduction of small amplitude variations.
macrodynamics: Reproduction of large-scale dynamic swings.
impact: Perceived transient force often correlated with low-frequency headroom and low compression.
speed: Subjective impression of fast transient response and low overhang.
decay_control: Ability of system to avoid prolonged resonance.
ringing: Time-domain oscillation following transient stimulus.
overhang: Excessive low-frequency decay due to high Q resonance.
tight_bass: Controlled low-frequency response with low group delay.
loose_bass: Bass reproduction with excessive decay or resonance.
texture: Perceived fine structure often influenced by distortion spectrum.
grainy: Audible low-level distortion or jitter artifacts.
smooth: Lack of sharp peaks in frequency response and low distortion.
harsh: Excess high-frequency distortion or resonant peaks.
etched: Emphasized high-frequency transients producing artificial clarity.
veiled: Attenuation in upper midrange reducing perceived clarity.
congested: Perceptual masking due to limited dynamic or spectral separation.
compressed_sound: Reduced dynamic range often due to heavy limiting.
open_sound: Perceived lack of enclosure coloration and extended high frequencies.
boxy: Resonant coloration in lower midrange often from enclosure modes.
nasal: Narrowband emphasis near 1 kHz to 2 kHz.
shouty: Excessive energy in upper midrange around 2 kHz to 4 kHz.
sibilant: Overemphasis around 5 kHz to 8 kHz accentuating consonants.
fatiguing: Listening discomfort often linked to distortion or treble peaks.
headroom_reserve: Available unclipped output capacity beyond listening level.
distortion_floor: Baseline distortion level at low signal amplitudes.
thdn: Total harmonic distortion plus noise.
imd_smpte: Intermodulation distortion measurement using SMPTE standard tones.
imd_ccif: Intermodulation distortion measurement using closely spaced high frequencies.
multitone_distortion: Distortion measurement using complex tone sets approximating music.
noise_density: Spectral distribution of noise energy.
phase_linearity: Consistency of phase response across frequency band.
channel_matching: Consistency between left and right channels.
channel_separation: Degree of isolation between stereo channels.
crosstalk: Unwanted signal leakage between channels.
impulse_symmetry: Symmetry of impulse response indicating phase behavior.
headphone_target_curve: Frequency response target compensating for ear coupling.
ear_gain: Natural amplification from pinna and ear canal.
coupler: Measurement fixture simulating human ear acoustic impedance.
iec_60318_4: Standard specifying ear simulator dimensions for headphone testing.
hats: Head and torso simulator used for acoustic measurement.
ear_simulator: Device replicating acoustic impedance of human ear.
seal_integrity: Proper acoustic sealing affecting low-frequency response.
clamp_force: Mechanical pressure applied by headphone on head.
pad_compliance: Cushion material flexibility affecting seal and response.
driver_matching: Consistency between left and right headphone drivers.
planar_transient_response: Rapid diaphragm response due to low moving mass.
electrostatic_bias: High voltage used to polarize electrostatic diaphragm.
amplifier_stability: Ability of amplifier to remain oscillation-free with reactive loads.
load_reactivity: Frequency-dependent impedance variation of speaker.
output_current_capacity: Maximum current amplifier can supply.
voltage_swing: Maximum peak voltage output capability.
thermal_noise: Noise generated by random motion of electrons.
johnson_noise: Thermal noise proportional to resistance and temperature.
shot_noise: Noise caused by discrete charge carriers.
flicker_noise: Low-frequency noise also called 1 over f noise.
jitter_spectrum: Frequency distribution of clock timing variation.
phase_modulation_distortion: Distortion due to phase instability.
