<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device PEQ Plugin Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; padding: 20px; }

    .peq-container {
      border: 1px solid #ccc;
      padding: 15px;
      max-width: 620px;
      margin-bottom: 20px;
      background-color: #f9f9f9;
    }
    .peq-container h3 { margin-top: 0; }

    /* Constraint info banner shown when a device is connected */
    #peq-constraint-banner {
      display: none;
      background: #e8f4fd;
      border: 1px solid #90c8f0;
      border-radius: 4px;
      padding: 6px 10px;
      margin-bottom: 10px;
      font-size: 0.85em;
      color: #1a4a6e;
    }
    #peq-constraint-banner span { margin-right: 12px; }

    /* Pregain row — hidden unless device requires host-managed pregain (deviceHandlesPregain: false) */
    #pregain-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #ddd;
    }
    #pregain-row label { font-weight: bold; }
    #pregain-input { width: 70px; }

    .filter-list { display: flex; flex-direction: column; gap: 10px; }

    .filter-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .filter-item label { font-size: 0.85em; white-space: nowrap; }
    .filter-item input[type="number"] { width: 72px; }

    /* Highlight inputs that exceed device limits */
    .filter-item input.gain-out-of-range { background: #ffe0e0; border-color: #c00; }
    .filter-item input.q-out-of-range    { background: #fff3cd; border-color: #e6a817; }

    /* Filter count badge next to the Add Filter button */
    #filter-count-badge {
      font-size: 0.8em;
      color: #666;
      margin-left: 6px;
    }
    #filter-count-badge.at-max { color: #c00; font-weight: bold; }

    .peq-controls { margin-top: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }

    button { padding: 5px 10px; cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── DevicePEQ plugin container ─────────────────────────────────────── */
    #deviceEqArea {
      border: 1px solid #ccc;
      padding: 15px;
      max-width: 620px;
      margin-bottom: 20px;
      background-color: #f9f9f9;
    }
    /* Keep connect + [I] on the same line; connect button fills remaining space */
    #deviceEqArea .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #deviceEqArea .settings-row .peq-connect-btn {
      flex: 1;
      width: auto;
    }
  </style>
</head>
<body>

<h2>CrinGraph 'Plugin' devicePEQ Test Page</h2>

<div class="peq-container">
  <h3>Filters</h3>

  <!-- Shown when a device connects; populated by applyConstraintsToUI() -->
  <div id="peq-constraint-banner"></div>

  <!-- Pregain — shown only when connected device reports deviceHandlesPregain:false (host must write it) -->
  <div id="pregain-row">
    <label for="pregain-input">Pregain (dB):</label>
    <input type="number" id="pregain-input" value="0" step="0.1">
  </div>

  <div id="filter-list" class="filter-list">
    <div class="filter-item">
      <label>Type:</label>
      <select class="filter-type"></select>
      <label>Freq:</label> <input type="number" class="filter-freq" value="100" min="20" max="20000" step="1">
      <label>Gain:</label> <input type="number" class="filter-gain" value="-3" min="-12" max="12" step="0.1">
      <label>Q:</label> <input type="number" class="filter-q" value="0.707" min="0.1" max="10" step="0.01">
    </div>
    <div class="filter-item">
      <label>Type:</label>
      <select class="filter-type"></select>
      <label>Freq:</label> <input type="number" class="filter-freq" value="1000" min="20" max="20000" step="1">
      <label>Gain:</label> <input type="number" class="filter-gain" value="1" min="-12" max="12" step="0.1">
      <label>Q:</label> <input type="number" class="filter-q" value="1.0" min="0.1" max="10" step="0.01">
    </div>
    <div class="filter-item">
      <label>Type:</label>
      <select class="filter-type"></select>
      <label>Freq:</label> <input type="number" class="filter-freq" value="2000" min="20" max="20000" step="1">
      <label>Gain:</label> <input type="number" class="filter-gain" value="3" min="-12" max="12" step="0.1">
      <label>Q:</label> <input type="number" class="filter-q" value="0.707" min="0.1" max="10" step="0.01">
    </div>
  </div>

  <div class="peq-controls">
    <button id="btn-add-filter" onclick="addFilter()">Add Filter</button>
    <span id="filter-count-badge"></span>
    <button onclick="clearFilters()">Clear Filters</button>
  </div>
</div>

<div class="extra-eq">
  <button id="btnLoadFR">Load FR...</button>
  <input type="file" id="frFileInput" accept=".txt" style="display:none;">
  <button id="btnLoadTargetFR">Load Target FR...</button>
  <input type="file" id="targetFRFileInput" accept=".txt" style="display:none;">
</div>

<!-- Point the constraints loader at the local copy during dev -->
<script>window.DEVICEPEQ_CONFIG_BASE_URL = './devicePEQ/';</script>

<!-- Import peqConstraints API and expose resolveConstraints globally -->
<script type="module">
  import { loadPeqConstraintsConfig, resolveConstraints } from './devicePEQ/peqConstraints.js';
  loadPeqConstraintsConfig().catch(err => console.warn('peqConstraintsConfig load failed:', err));
  window.resolvePeqConstraints = resolveConstraints;
</script>

<script>
  // Global phoneObj holds the loaded FR data for plugins
  const phoneObj = {
    rawChannels: []  // Array of {freq, spl, phase} objects
  }
  const targetObj = {
    rawChannels: []  // Array of {freq, spl, phase} objects
  };

  window.phoneObj = phoneObj;
  // Helper: ensure default flat FR if none loaded
  function ensureDefaultFRIntoPhone() {
    if (phoneObj.rawChannels && phoneObj.rawChannels.length) return;
    const points = 256;
    const fMin = 20, fMax = 20000;
    const logMin = Math.log10(fMin), logMax = Math.log10(fMax);
    phoneObj.rawChannels = [];
    for (let i = 0; i < points; i++) {
      const t = i / (points - 1);
      const f = Math.pow(10, logMin + t * (logMax - logMin));
      phoneObj.rawChannels.push({ freq: f, spl: 0, phase: 0 });
    }
  }

  // Parse FR .txt file (expects header row then f spl phase columns)
  function parseFRTextIntoPhone(text) {
    try {
      const lines = text.trim().split(/\r?\n/);
      const channel = []
      for (let line of lines.slice(1)) {
        const parts = line.trim().split(/\s+/).map(Number);
        if (parts.length >= 2 && !Number.isNaN(parts[0]) && !Number.isNaN(parts[1])) {
          // Use array format [freq, spl] to match visualizer expectations
          channel.push([parts[0], parts[1]]);
        }
      }
      if (channel.length) {
        const rawChannels = [];
        rawChannels.push(channel);
        phoneObj.rawChannels = rawChannels;
        console.log('FR loaded into phoneObj:', { points: channel.length });
        document.dispatchEvent(new CustomEvent('PhoneFRLoaded'));
      } else {
        console.warn('FR file parsed but no usable rows found');
      }
    } catch (e) {
      console.error('Failed parsing FR file:', e);
    }
  }

  // Wire up FR loader UI
  const btnLoadFR = document.getElementById('btnLoadFR');
  const frInput = document.getElementById('frFileInput');
  if (btnLoadFR && frInput) {
    btnLoadFR.addEventListener('click', () => frInput.click());
    frInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => parseFRTextIntoPhone(ev.target.result);
      reader.readAsText(file);
      // Reset input so selecting same file again triggers change
      e.target.value = '';
    });
  }

  // Parse Target FR .txt file
  function parseTargetFRTextIntoPhone(text) {
    try {
      const lines = text.trim().split(/\r?\n/);
      const rawChannels = [];
      for (let line of lines.slice(1)) {
        const parts = line.trim().split(/\s+/).map(Number);
        if (parts.length >= 2 && !Number.isNaN(parts[0]) && !Number.isNaN(parts[1])) {
          rawChannels.push({
            freq: parts[0],
            spl: parts[1],
            phase: 0  // Target usually doesn't have phase
          });
        }
      }
      if (rawChannels.length) {
        targetObj.rawChannels = rawChannels;
        console.log('Target FR loaded into targetObj:', { points: rawChannels.length });
        document.dispatchEvent(new CustomEvent('TargetFRLoaded'));
      } else {
        console.warn('Target FR file parsed but no usable rows found');
      }
    } catch (e) {
      console.error('Failed parsing Target FR file:', e);
    }
  }

  // Wire up Target FR loader UI
  const btnLoadTargetFR = document.getElementById('btnLoadTargetFR');
  const targetFRInput = document.getElementById('targetFRFileInput');
  if (btnLoadTargetFR && targetFRInput) {
    btnLoadTargetFR.addEventListener('click', () => targetFRInput.click());
    targetFRInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => parseTargetFRTextIntoPhone(ev.target.result);
      reader.readAsText(file);
      // Reset input so selecting same file again triggers change
      e.target.value = '';
    });
  }

  // Wire up Normalize FR input
  const normalizeFRInput = document.getElementById('normalizeFRInput');
  if (normalizeFRInput) {
    normalizeFRInput.addEventListener('input', () => {
      const value = parseFloat(normalizeFRInput.value);
      phoneObj.normalizeFRFreq = (!isNaN(value) && value >= 20 && value <= 20000) ? value : null;
      console.log('Normalize FR frequency set to:', phoneObj.normalizeFRFreq);
      document.dispatchEvent(new CustomEvent('NormalizeFRChanged'));
    });
  }
  // All known filter types in display order.
  // flag: the peqConstraints field that must be true for the type to be enabled.
  // null means always available (Peak is universally supported).
  // Canonical filter type values used in filter objects and sent to device handlers.
  // 'AP' matches the Truthear app convention and is the widely-used short form.
  const ALL_FILTER_TYPES = [
    { value: 'PK',    label: 'Peak',        flag: null },
    { value: 'LSQ',   label: 'Low Shelf',   flag: 'supportsLSFilter' },
    { value: 'HSQ',   label: 'High Shelf',  flag: 'supportsHSFilter' },
    { value: 'LP',    label: 'Low Pass',    flag: 'supportsLPFilter' },
    { value: 'HP',    label: 'High Pass',   flag: 'supportsHPFilter' },
    { value: 'BP',    label: 'Band Pass',   flag: 'supportsBPFilter' },
    { value: 'NOTCH', label: 'Notch',       flag: 'supportsNotchFilter' },
    { value: 'BS',    label: 'Band Stop',   flag: 'supportsBandStopFilter' },
    { value: 'CQ',    label: 'Constant Q',  flag: 'supportsConstantQFilter' },
    { value: 'AP',    label: 'All Pass',    flag: 'supportsAllPassFilter' },
  ];

  // Resolve peqConstraints from current modelConfig using the loaded API (or fall back)
  function currentConstraints() {
    const modelConfig = window.peqDeviceModelConfig || null;
    if (!modelConfig) return null;
    return (window.resolvePeqConstraints || (mc => mc))(modelConfig);
  }

  // Build <option> elements for a filter-type <select>, greying out unsupported types
  function buildFilterTypeOptions(selectedType) {
    const c = currentConstraints();
    return ALL_FILTER_TYPES.map(({ value, label, flag }) => {
      const supported = !flag || !c || c[flag] === true;
      const sel = value === selectedType ? ' selected' : '';
      const dis = supported ? '' : ' disabled';
      const style = supported ? '' : ' style="color:#aaa"';
      return `<option value="${value}"${sel}${dis}${style}>${label}</option>`;
    }).join('');
  }

  // Apply all constraint-driven UI updates whenever the device config changes
  function applyConstraintsToUI() {
    const c = currentConstraints();

    // 1 — filter-type dropdowns
    document.querySelectorAll('select.filter-type').forEach(sel => {
      sel.innerHTML = buildFilterTypeOptions(sel.value);
    });

    // 2 — gain input min/max/step + out-of-range highlight
    const minGain = c?.minGain ?? -12;
    const maxGain = c?.maxGain ?? 12;
    document.querySelectorAll('input.filter-gain').forEach(inp => {
      inp.setAttribute('min', minGain);
      inp.setAttribute('max', maxGain);
      inp.setAttribute('step', '0.1');
      const v = parseFloat(inp.value);
      inp.classList.toggle('gain-out-of-range', !isNaN(v) && (v < minGain || v > maxGain));
    });

    // 2b — Q input min/max/step + out-of-range highlight
    const minQ = c?.minQ ?? 0.1;
    const maxQ = c?.maxQ ?? 10.0;
    document.querySelectorAll('input.filter-q').forEach(inp => {
      inp.setAttribute('min', minQ);
      inp.setAttribute('max', maxQ);
      inp.setAttribute('step', '0.01');
      const v = parseFloat(inp.value);
      inp.classList.toggle('q-out-of-range', !isNaN(v) && (v < minQ || v > maxQ));
    });

    // 3 — pregain row visibility
    const pregainRow = document.getElementById('pregain-row');
    if (pregainRow) pregainRow.style.display = c?.deviceHandlesPregain === false ? 'flex' : 'none';

    // 4 — Add Filter button and filter count badge
    const maxFilters = c?.maxFilters ?? Infinity;
    const filterCount = document.querySelectorAll('#filter-list .filter-item').length;
    const addBtn = document.getElementById('btn-add-filter');
    const badge = document.getElementById('filter-count-badge');
    if (addBtn) addBtn.disabled = filterCount >= maxFilters;
    if (badge) {
      if (c && isFinite(maxFilters)) {
        badge.textContent = `${filterCount} / ${maxFilters} filters`;
        badge.className = filterCount >= maxFilters ? 'at-max' : '';
      } else {
        badge.textContent = filterCount > 0 ? `${filterCount} filter${filterCount !== 1 ? 's' : ''}` : '';
        badge.className = '';
      }
    }

    // 5 — constraint info banner
    const banner = document.getElementById('peq-constraint-banner');
    if (banner) {
      if (c && window.peqDeviceModelConfig) {
        const gainStr = c.minGain === -c.maxGain
          ? `±${c.maxGain} dB`
          : `${c.minGain} / +${c.maxGain} dB`;
        const shelves = c.supportsLSFilter && c.supportsHSFilter ? 'LS + HS'
          : c.supportsLSFilter ? 'LS only'
          : c.supportsHSFilter ? 'HS only'
          : 'Peak only';
        const lphp = c.supportsLPHPFilters ? ' + LP/HP' : '';
        const pregain = c.deviceHandlesPregain === false ? ' · Pregain' : '';
        banner.innerHTML = `<span><b>${c.maxFilters} bands</b></span><span>${gainStr}</span><span>${shelves}${lphp}${pregain}</span>`;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }
    }
  }

  // Re-run on every device connect/disconnect event
  document.addEventListener('PeqDeviceModelConfigChanged', applyConstraintsToUI);

  // Initialise on page load (no device connected yet)
  window.peqDeviceModelConfig = null;
  applyConstraintsToUI();

  // Populate PEQ rows from a filter array (called by the plugin after Pull from device)
  function filtersToElem(filters) {
    console.log("Applying filters from device:", filters);
    const c = currentConstraints();
    const minGain = c?.minGain ?? -12;
    const maxGain = c?.maxGain ?? 12;
    const minQ    = c?.minQ   ?? 0.1;
    const maxQ    = c?.maxQ   ?? 10.0;
    const filterList = document.getElementById('filter-list');
    filterList.innerHTML = '';
    filters.forEach(filter => {
      const filterItem = document.createElement('div');
      filterItem.className = 'filter-item';
      const filterType = filter.type || 'PK';
      filterItem.innerHTML = `
        <label>Type:</label>
        <select class="filter-type">${buildFilterTypeOptions(filterType)}</select>
        <label>Freq:</label> <input type="number" class="filter-freq" value="${filter.freq}" min="20" max="20000" step="1">
        <label>Gain:</label> <input type="number" class="filter-gain" value="${filter.gain}" min="${minGain}" max="${maxGain}" step="0.1">
        <label>Q:</label> <input type="number" class="filter-q" value="${filter.q}" min="${minQ}" max="${maxQ}" step="0.01">
      `;
      filterList.appendChild(filterItem);
    });
    applyConstraintsToUI();
  }

  // Mock function to extract filters from UI for pushing to the device
  function elemToFilters(includeDisabled) {
    const filterElems = document.querySelectorAll(".filter-item");
    const filters = Array.from(filterElems).map(elem => ({
      type: elem.querySelector(".filter-type").value,
      freq: parseFloat(elem.querySelector(".filter-freq").value),
      gain: parseFloat(elem.querySelector(".filter-gain").value),
      q: parseFloat(elem.querySelector(".filter-q").value),
      disabled: false, // Can be extended to support enabling/disabling
    }));
    console.log("Extracted filters:", filters);
    return filters;
  }

  // Mock function to calculate the preamp gain from the filters
  function calcEqDevPreamp(filters) {
    const maxGain = Math.max(...filters.map(f => f.gain));
    console.log("Calculated Preamp Gain:", -maxGain);
    if (maxGain < 0) return 0;  //
    return -maxGain; // Simple logic to avoid clipping
  }

  // Mock function to apply the EQ
  function applyEQ() {

  }

  let norm_fr = 1000;
  let getCurrentPhoneTargetNormalisation = () => {

    return {
      phoneObj,
      targetObj,
      norm_fr
    };
  }

  /**
   * Load and display a flat EQ phone measurement by fileName
   * @param {string} fileName - The fileName identifier (e.g., "Nothing HP1 Balanced")
   * @param {string} source - Source identifier for logging (default: 'deviceConnection')
   * @returns {Object} { success: boolean, phone: phoneObj|null, error: string|null }
   */
  function loadPairedPhone(fileName, source = 'deviceConnection') {
    console.log(`loadPairedPhone: Attempting to load flat EQ measurement with fileName="${fileName}"`);

    // Validation: Check if fileName provided
    if (!fileName || typeof fileName !== 'string' || fileName.trim() === '') {
      const error = 'loadPairedPhone: Invalid or empty fileName provided';
      console.warn(error);
      return { success: false, phone: null, error };
    }

    // Safety check: Verify graphTool.js is loaded
    if (typeof window.allPhones === 'undefined') {
      const error = 'loadPairedPhone: window.allPhones not available';
      console.warn(error);
      return { success: false, phone: null, error };
    }

    if (typeof window.showPhone !== 'function') {
      const error = 'loadPairedPhone: window.showPhone function not available';
      console.warn(error);
      return { success: false, phone: null, error };
    }

    // Search for the phone by fileName (exact match)
    const phoneObj = window.allPhones.find(p => p.fileName === fileName);

    if (!phoneObj) {
      const error = `loadPairedPhone: Flat EQ measurement with fileName="${fileName}" not found`;
      console.warn(error);
      console.log('Available fileNames (sample):', window.allPhones.slice(0, 10).map(p => p.fileName));
      return { success: false, phone: null, error };
    }

    console.log(`loadPairedPhone: Found flat EQ measurement:`, {
      fileName: phoneObj.fileName,
      fullName: phoneObj.fullName,
      brand: phoneObj.brand
    });

    try {
      // Call window.showPhone:
      // - exclusive: false (add to display, don't remove existing)
      // - suppressVariant: true (no popup for auto-loaded phones)
      // - trigger: source identifier
      window.showPhone(phoneObj, false, true, source);

      console.log(`loadPairedPhone: Successfully loaded flat EQ measurement "${phoneObj.fileName}"`);
      return { success: true, phone: phoneObj, error: null };

    } catch (err) {
      const error = `loadPairedPhone: Error calling window.showPhone: ${err.message}`;
      console.error(error, err);
      return { success: false, phone: phoneObj, error };
    }
  }

  // Add a new filter row, respecting the device's maxFilters constraint
  function addFilter() {
    const c = currentConstraints();
    const maxFilters = c?.maxFilters ?? Infinity;
    const filterList = document.getElementById('filter-list');
    if (filterList.querySelectorAll('.filter-item').length >= maxFilters) return;
    const minGain = c?.minGain ?? -12;
    const maxGain = c?.maxGain ?? 12;
    const minQ    = c?.minQ   ?? 0.1;
    const maxQ    = c?.maxQ   ?? 10.0;
    const filterItem = document.createElement('div');
    filterItem.className = 'filter-item';
    filterItem.innerHTML = `
      <label>Type:</label>
      <select class="filter-type">${buildFilterTypeOptions('PK')}</select>
      <label>Freq:</label> <input type="number" class="filter-freq" value="1000" min="20" max="20000" step="1">
      <label>Gain:</label> <input type="number" class="filter-gain" value="0" min="${minGain}" max="${maxGain}" step="0.1">
      <label>Q:</label> <input type="number" class="filter-q" value="0.707" min="${minQ}" max="${maxQ}" step="0.01">
    `;
    filterList.appendChild(filterItem);
    applyConstraintsToUI();
  }

  // Pad the filter list up to targetCount rows, respecting maxFilters.
  // Rows already present are left untouched; only empty rows are appended.
  // Calls applyConstraintsToUI once after all rows are added.
  function expandFiltersTo(targetCount) {
    const c = currentConstraints();
    const maxFilters = c?.maxFilters ?? Infinity;
    const minGain = c?.minGain ?? -12;
    const maxGain = c?.maxGain ?? 12;
    const minQ    = c?.minQ   ?? 0.1;
    const maxQ    = c?.maxQ   ?? 10.0;
    const limit = Math.min(targetCount, maxFilters);
    const filterList = document.getElementById('filter-list');
    let current = filterList.querySelectorAll('.filter-item').length;
    while (current < limit) {
      const item = document.createElement('div');
      item.className = 'filter-item';
      item.innerHTML = `
        <label>Type:</label>
        <select class="filter-type">${buildFilterTypeOptions('PK')}</select>
        <label>Freq:</label> <input type="number" class="filter-freq" value="1000" min="20" max="20000" step="1">
        <label>Gain:</label> <input type="number" class="filter-gain" value="0" min="${minGain}" max="${maxGain}" step="0.1">
        <label>Q:</label> <input type="number" class="filter-q" value="0.707" min="${minQ}" max="${maxQ}" step="0.01">
      `;
      filterList.appendChild(item);
      current++;
    }
    applyConstraintsToUI();
  }

  // Clear all filters and refresh the constraint UI
  function clearFilters() {
    document.getElementById('filter-list').innerHTML = '';
    applyConstraintsToUI();
  }

      // Typically this should be put into the config.js in a Cringraph
      let extraEQplugins = [
        './devicePEQ/plugin.js', // Path to one or more "extraEQ" plugins
        './sharePEQ/plugin.js', // Path to one or more "extraEQ" plugins
        './visualizePEQ/plugin.js',  // Add the visualizePEQ plugin
        './subjectizePEQ/plugin.js',  // Add the subjectizePEQ plugin
        './treblizerPEQ/plugin.js'    // Add the Treblizer (Treble Smoothing Studio) plugin
      ];

      // ... existing code ...

      // Might come from the config.js
      let config = {
        advanced: true,
        showLogs: true,
        showExtras: true,
        pullValuesOnConnect: true,  // auto-pull device filters on connect and pass to onDeviceConnected
        renderPEQ: {
          enabled: true,
          position: 'peq-controls',
          buttonText: 'PEQ Visualizer',
          buttonClass: 'renderPEQ-control-btn'
        }
      };

  /**
   * Dynamically load a plugin from a sub-folder passing it the useful context
   * @param pluginsToLoad
   * @param context
   * @returns {Promise<void>}
   */
  async function loadPlugins(pluginsToLoad, context) {
    for (const pluginPath of pluginsToLoad) {
      try {
        let initializePlugin;

        if (typeof module !== 'undefined' && module.exports) {
          // CommonJS environment (e.g., Node.js)
          initializePlugin = require(pluginPath);
        } else {
          // ES Module environment (e.g., modern browsers)
          const module = await import(pluginPath);
          initializePlugin = module.default;
        }

        // Call the plugin function with the provided context
        await initializePlugin(context);
        console.log(`Successfully loaded plugin: ${pluginPath}`);
      } catch (error) {
        console.error(`Error loading plugin ${pluginPath}:`, error.message);
      }
    }
  }

  // Ensure phoneObj has at least a flat FR before plugins use it
  ensureDefaultFRIntoPhone();

  // Live gain and Q validation: highlight out-of-range inputs as the user types
  document.getElementById('filter-list').addEventListener('input', e => {
    const c = currentConstraints();
    if (!c) return;
    const v = parseFloat(e.target.value);
    if (e.target.classList.contains('filter-gain')) {
      e.target.classList.toggle('gain-out-of-range', !isNaN(v) && (v < c.minGain || v > c.maxGain));
    } else if (e.target.classList.contains('filter-q')) {
      const minQ = c.minQ ?? 0.1;
      const maxQ = c.maxQ ?? 10.0;
      e.target.classList.toggle('q-out-of-range', !isNaN(v) && (v < minQ || v > maxQ));
    }
  });

  // Load the plugin with the provided functions and phoneObj
  if (typeof extraEQplugins !== "undefined") {
    loadPlugins(extraEQplugins, {
      filtersToElem,  // Put Filters back to Html Elements
      elemToFilters,  // Get Filters from Html Elements
      calcEqDevPreamp,// Reuse existing gain calculations
      applyEQ,        // Apply EQ
      config,
      getCurrentPhoneTargetNormalisation,
      loadPairedPhone, // Load phone model by fileName
      onDeviceConnected(device, peqConstraints, currentPEQValues) {
        // peqConstraints   – resolved constraint profile from peqConstraintsConfig.json
        // currentPEQValues – filter array already loaded from device (if pullValuesOnConnect
        //                    is true and pull succeeded), otherwise null
        console.log('Device connected:', device.model, peqConstraints);

        // Expand the filter list to the device's full band count.
        // If currentPEQValues was provided, filtersToElem already populated the rows
        // with real values; expandFiltersTo pads any remaining empty slots up to maxFilters.
        // If no values were pulled, this pre-fills all available band slots as blank rows.
        if (peqConstraints?.maxFilters) {
          expandFiltersTo(peqConstraints.maxFilters);
        }
      }
    });
  }

  // After plugins load, wire up the button to call openOverlay with phoneObj
  // This simulates how graphtool.js will call the plugin
  setTimeout(() => {
    const openPEQBtn = document.getElementById('openPEQOverlay');
    if (openPEQBtn && typeof window.renderPEQOpenOverlay === 'function') {
      // Override the button click to pass phoneObj directly
      openPEQBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();

        // targetObj already has rawChannels format - no conversion needed

        // Get alignment frequency from normalizeFRInput
        const alignFreq = phoneObj.normalizeFRFreq || null;

        // Optional: Define limits for gain and Q values (defaults: maxGain=12, minGain=-12, minQ=0.2, maxQ=10)
        const limits = {
          maxGain: 12,
          minGain: -12,
          minQ: 0.2,
          maxQ: 10
        };

        // Call the openOverlay method with the optional parameters
        window.renderPEQOpenOverlay(phoneObj, targetObj, alignFreq, limits);
      }, true); // Use capture phase to intercept before plugin's handler
    }
  }, 500); // Wait for plugin to initialize

  // On load: check URL for F/T/G/Q/D params and auto-add that many filters for testing
  (function autoAddFiltersFromUrl(){
    try {
      const params = new URLSearchParams(window.location.search || '');
      let maxIndex = 0;
      for (const key of params.keys()) {
        // Match F1/T2/G10/Q3/D4 etc.
        const m = /^([FTGQD])(\d+)$/.exec(key);
        if (m) {
          const idx = parseInt(m[2], 10);
          if (!isNaN(idx)) maxIndex = Math.max(maxIndex, idx);
        }
      }
      if (maxIndex > 0) {
        const list = document.getElementById('filter-list');
        const current = (list && list.querySelectorAll('.filter-item').length) || 0;
        for (let i = current; i < maxIndex; i++) {
          addFilter();
        }
        // Optionally, we could populate values here, but requirement only asks to add rows.
        // Fire an event similar to what plugins might listen to, for consistency.
        try { document.dispatchEvent(new CustomEvent('UpdateExtensionFilters')); } catch(_) {}
      }
    } catch(e) {
      console.warn('Auto-add filters from URL failed:', e);
    }
  })();
</script>

</body>
</html>
